name: Windows10
on: workflow_dispatch

jobs:
  win10:
    runs-on: windows-2022

    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Enable Remote Desktop
        run: |
          # Enable RDP in Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Allow unauthenticated RPC (helps with some RDP clients)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Connect Tailscale
        run: |
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"
          
          # HARDCODED KEY APPLIED BELOW
          $authKey = "tskey-auth-kimGNQPCkz11CNTRL-3fDxcDxBubijSqRCoUw4cidnqU7haxvY"

          & "C:\Program Files\Tailscale\tailscale.exe" up `
            --authkey=$authKey `
            --hostname=$hostname `
            --unattended --reset

      - name: Configure User
        run: |
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          $newUser = New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User" -Description "User for RDP"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"

          echo "=========================================="
          echo "HOSTNAME: $hostname"
          echo "SUCCESS! CONNECT TO THIS IP: $tsIP"
          echo "USERNAME: RDPUser"
          echo "PASSWORD: MySecurePass123!"
          echo "=========================================="

      - name: Install VirtualBox and Setup VM
        run: |
          Write-Host "===== DOWNLOADING VIRTUALBOX ====="

          $vbUrl = "https://download.virtualbox.org/virtualbox/7.0.14/VirtualBox-7.0.14-161095-Win.exe"
          $vbInstaller = "VirtualBox.exe"

          Invoke-WebRequest $vbUrl -OutFile $vbInstaller
          Write-Host "VirtualBox download complete"

          Write-Host "===== INSTALLING VIRTUALBOX ====="
          Start-Process -FilePath $vbInstaller -ArgumentList "--silent --ignore-reboot" -Wait
          Write-Host "VirtualBox installed"

          Write-Host "===== DOWNLOADING VDI FILE ====="

          $vdiUrl = "https://archive.org/download/windows-8-startup/Windows%208%20Pro.vdi"
          $vdiPath = "$env:USERPROFILE\Windows8Pro.vdi"

          Invoke-WebRequest $vdiUrl -OutFile $vdiPath
          Write-Host "VDI download complete: $vdiPath"

          Write-Host "===== CREATING VM ====="

          $vmName = "Windows8VM"

          & "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" createvm --name $vmName --register
          Write-Host "VM created"

          & "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" modifyvm $vmName --memory 2048 --cpus 2 --nic1 nat
          Write-Host "VM configured (RAM/CPU)"

          & "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" storagectl $vmName --name "SATA Controller" --add sata --controller IntelAhci
          
          & "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" storageattach $vmName `
            --storagectl "SATA Controller" `
            --port 0 --device 0 `
            --type hdd `
            --medium $vdiPath

          Write-Host "VDI attached to VM"

          Write-Host "===== STARTING VM (HEADLESS) ====="

          & "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" startvm $vmName --type headless

          Write-Host "VM start command issued"

          # Keeps the runner alive
          while($true) { Start-Sleep -Seconds 60 }
