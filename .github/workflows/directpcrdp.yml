name: DIRECT_PC_RDP
on: workflow_dispatch

jobs:
  summon-pc:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-desktop --unattended --reset

      - name: Configure User
        run: |
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"

      - name: Update Gist with IP
        run: |
          # 1. Get the Tailscale IP
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          
          # 2. CONFIGURATION (REPLACE THESE)
          $GistID = "8c4b77d79acaee394576774f8d341581"
          $Token  = "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" # Put your token string inside these quotes
          
          # 3. Prepare the API Call
          $url = "https://api.github.com/gists/$GistID"
          $headers = @{
              "Authorization" = "Bearer $Token"
              "Accept"        = "application/vnd.github+json"
          }
          $body = @{
              files = @{
                  "rdp_ip.txt" = @{ content = "$tsIP" }
              }
          } | ConvertTo-Json

          # 4. Update the Gist (Overwrite old IP)
          Invoke-RestMethod -Method Patch -Uri $url -Headers $headers -Body $body
          echo "Gist updated with IP: $tsIP"

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "=========================================="
          echo "SUCCESS! CONNECT TO THIS IP: $tsIP"
          echo "USERNAME: RDPUser"
          echo "PASSWORD: MySecurePass123!"
          echo "=========================================="
          while($true) { Start-Sleep -Seconds 60 }
