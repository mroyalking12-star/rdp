name: Win11-CloudDrive
on: workflow_dispatch

jobs:
  summon-pc:
    runs-on: windows-latest

    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Install Rclone & WinFsp
        run: |
          choco install rclone winfsp -y

      - name: Connect Tailscale
        run: |
          $authKey = "tskey-auth-kimGNQPCkz11CNTRL-3fDxcDxBubijSqRCoUw4cidnqU7haxvY"
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$authKey --hostname="Win11-Cloud" --unattended --reset

      - name: Create RDPUser (Force Password)
        run: |
          # 1. Create the user
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          $newUser = New-LocalUser -Name "RDPUser" -Password $Password -FullName "Cloud User"
          
          # 2. Add to Admin and RDP Groups
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"
          
          # 3. FORCE PASSWORD (This fixes the 'Wrong Password' error)
          net user RDPUser MySecurePass123! /active:yes

      - name: Setup Public Desktop Folder
        run: |
          # Use Public Desktop so it shows up for everyone
          $PublicPath = "C:\Users\Public\Desktop\InfiniCloud"
          if (!(Test-Path $PublicPath)) { New-Item -ItemType Directory -Path $PublicPath -Force }
          icacls $PublicPath /grant "Everyone:(OI)(CI)F" /T

      - name: Mount InfiniCLOUD
        shell: pwsh
        run: |
          $user = "meownsoor"
          $pass = "uwWfVg3HNyQ4NE5s"
          $url = "https://otaru.infini-cloud.net/dav/"
          $obscured = rclone obscure $pass
          
          New-Item -ItemType Directory -Force -Path "D:\rcache"
          $MountPath = "C:\Users\Public\Desktop\InfiniCloud"
          
          Start-Process rclone -ArgumentList "mount :webdav: `"$MountPath`" --webdav-url $url --webdav-user $user --webdav-pass $obscured --vfs-cache-mode full --vfs-cache-max-size 20G --cache-dir D:\rcache" -WindowStyle Hidden
          
          Start-Sleep -Seconds 20

      - name: Final Connection Info
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "=========================================="
          echo "IP: $tsIP"
          echo "USER: RDPUser"
          echo "PASS: MySecurePass123!"
          echo "=========================================="
          while($true) { Start-Sleep -Seconds 60 }
