name: Win11-CloudDrive
on: workflow_dispatch

jobs:
  summon-pc:
    runs-on: windows-latest

    steps:
      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

      - name: Install Rclone & WinFsp
        run: |
          choco install rclone winfsp -y

      - name: Connect Tailscale
        run: |
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMdd").ToUpper()
          $hostname = "$user-$date"
          $authKey = "tskey-auth-kimGNQPCkz11CNTRL-3fDxcDxBubijSqRCoUw4cidnqU7haxvY"
          
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$authKey --hostname=$hostname --unattended --reset

      - name: Configure User & Desktop Folder
        run: |
          # Create the RDP User
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          $newUser = New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User" -Description "User for RDP"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          
          # Create the mount folder on the RDPUser's Desktop
          $CloudPath = "C:\Users\RDPUser\Desktop\InfiniCloud"
          if (!(Test-Path $CloudPath)) { New-Item -ItemType Directory -Path $CloudPath -Force }

      - name: Mount InfiniCLOUD (Direct Method)
        shell: pwsh
        run: |
          $user = "meownsoor"
          $pass = "uwWfVg3HNyQ4NE5s"
          $url = "https://otaru.infini-cloud.net/dav/"
          $obscured = rclone obscure $pass
          
          # Setup cache on D: drive (Large Drive)
          New-Item -ItemType Directory -Force -Path "D:\rcache"

          # Use the Desktop folder path we created
          $DesktopFolder = "C:\Users\RDPUser\Desktop\InfiniCloud"
          
          # Mount Command
          Start-Process rclone -ArgumentList "mount :webdav: `"$DesktopFolder`" --webdav-url $url --webdav-user $user --webdav-pass $obscured --vfs-cache-mode full --vfs-cache-max-size 20G --cache-dir D:\rcache" -WindowStyle Hidden
          
          Start-Sleep -Seconds 15

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "=========================================="
          echo "SUCCESS! IP: $tsIP"
          echo "USER: RDPUser | PASS: MySecurePass123!"
          echo "=========================================="
          while($true) { Start-Sleep -Seconds 60 }
