name: Win11
on: workflow_dispatch

jobs:
  summon-pc:
    runs-on: windows-latest
    # Required permissions for the script to query your GitHub Actions history
    permissions:
      actions: read
      contents: read

    steps:
      - name: Calculate Remaining Time
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOTAL_LIMIT_MINS: 2000
        run: |
          # 1. Get the current workflow's unique ID dynamically
          WORKFLOW_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            | jq -r '.workflow_id')

          # 2. Get the total duration of all completed runs for THIS workflow ID (up to last 100)
          PREVIOUS_MS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs?status=completed&per_page=100" \
            | jq '[.workflow_runs[].run_duration_ms | select(. != null)] | add // 0')

          # 3. Convert milliseconds to minutes
          USED_MINS=$(( PREVIOUS_MS / 60000 ))

          # 4. Calculate remaining time
          REMAINING_MINS=$(( TOTAL_LIMIT_MINS - USED_MINS ))

          # 5. Format into Hours and Minutes
          RES_H=$(( REMAINING_MINS / 60 ))
          RES_M=$(( REMAINING_MINS % 60 ))

          # 6. Log the result clearly in the console
          echo "=========================================="
          echo "DEBUG: Total Minutes Already Used: $USED_MINS"
          if [ $REMAINING_MINS -le 0 ]; then
            echo "NOTICE: No time remaining! Limit of $TOTAL_LIMIT_MINS minutes reached."
          else
            echo "LOG: You can use win 11 for upto ${RES_H}h ${RES_M} minutes"
          fi
          echo "=========================================="

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile tailscale.msi
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait

      - name: Connect Tailscale
        run: |
          $user = "${{ github.actor }}"
          $date = (Get-Date).ToString("yyyyMMMMdd").ToUpper()
          $hostname = "$user-$date"

          & "C:\Program Files\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=$hostname `
            --unattended --reset

      - name: Configure User
        run: |
          $Password = ConvertTo-SecureString "MySecurePass123!" -AsPlainText -Force
          New-LocalUser -Name "RDPUser" -Password $Password -FullName "RDP User"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"

      - name: Ready to Connect
        run: |
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4

          echo "=========================================="
          echo "HOSTNAME: $hostname"
          echo "SUCCESS! CONNECT TO THIS IP: $tsIP"
          echo "USERNAME: RDPUser"
          echo "PASSWORD: MySecurePass123!"
          echo "=========================================="

          while($true) { Start-Sleep -Seconds 60 }
